# Example only. Do not commit live ~/.hermes/config.yaml.
model:
  provider: custom:eksad-litellm
  model: eksad.default
  base_url: ${EKSAD_LITELLM_BASE_URL}/v1
  api_key: ${EKSAD_LITELLM_API_KEY}

delegation:
