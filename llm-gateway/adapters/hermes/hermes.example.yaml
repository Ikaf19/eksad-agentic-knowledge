  model: eksad.default

# Role profiles may override only the alias/model name, not provider secrets.
profiles:
  business-analyst:
    model: eksad.default
  system-analyst:
    model: eksad.reasoning
  technical-leader:
    model: eksad.reasoning
  developer-backend:
    model: eksad.default
  developer-frontend:
    model: eksad.default
  qa-engineer:
    model: eksad.default
  devops-engineer:
    model: eksad.default
