# Hermes MCP example — Jenkins Read-only MCP
# Template only. Do not paste real secrets into Git.

mcp_servers:
  jenkins_readonly:
    command: "/opt/eksad-mcp/bin/jenkins-readonly"
    args: []
    env:
      JENKINS_BASE_URL: "${JENKINS_BASE_URL}"
      JENKINS_READONLY_TOKEN: "${JENKINS_READONLY_TOKEN}"
    timeout: 120
    connect_timeout: 60
    sampling:
      enabled: false
