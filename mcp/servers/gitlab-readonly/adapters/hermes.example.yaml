# Hermes MCP example — GitLab Read-only MCP
# Template only. Do not paste real secrets into Git.

mcp_servers:
  gitlab_readonly:
    command: "/opt/eksad-mcp/bin/gitlab-readonly"
    args: []
    env:
      GITLAB_READONLY_TOKEN: "${GITLAB_READONLY_TOKEN}"
      GITLAB_BASE_URL: "${GITLAB_BASE_URL}"
    timeout: 120
    connect_timeout: 60
    sampling:
      enabled: false
