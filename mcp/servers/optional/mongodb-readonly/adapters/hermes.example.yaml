# Hermes MCP example — MongoDB Read-only MCP
# Template only. Do not paste real secrets into Git.

mcp_servers:
  mongodb_readonly:
    command: "/opt/eksad-mcp/bin/mongodb-readonly"
    args: []
    env:
      MONGODB_READONLY_URL: "${MONGODB_READONLY_URL}"
    timeout: 120
    connect_timeout: 60
    sampling:
      enabled: false
