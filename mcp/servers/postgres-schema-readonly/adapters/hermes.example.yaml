# Hermes MCP example — PostgreSQL Schema Read-only MCP
# Template only. Do not paste real secrets into Git.

mcp_servers:
  postgres_schema_readonly:
    command: "/opt/eksad-mcp/bin/postgres-schema-readonly"
    args: []
    env:
      POSTGRES_SCHEMA_READONLY_URL: "${POSTGRES_SCHEMA_READONLY_URL}"
    timeout: 120
    connect_timeout: 60
    sampling:
      enabled: false
