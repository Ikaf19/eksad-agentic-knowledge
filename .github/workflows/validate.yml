name: Validate knowledge repo

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate complete source of truth
        run: bash scripts/validate-all.sh

      - name: Render RAG ingestion plan
        run: python3 rag/scripts/render-ingestion-plan.py

      - name: Render RAG MCP manifest summary
        run: python3 rag/scripts/render-rag-mcp-manifest.py

      - name: Render LiteLLM config example
        run: python3 llm-gateway/scripts/render-litellm-config.py
