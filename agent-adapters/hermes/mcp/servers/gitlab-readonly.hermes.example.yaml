# Hermes MCP example — GitLab read-only
# Placeholder only. Replace command/url with an approved MCP server implementation.
# Secrets must come from local env, not Git.

mcp_servers:
  gitlab_readonly:
    command: "/opt/eksad-mcp/bin/gitlab-readonly"
    args: []
    env:
      GITLAB_READONLY_TOKEN: "${GITLAB_READONLY_TOKEN}"
    timeout: 120
    connect_timeout: 60
    sampling:
      enabled: false
