# Hermes MCP example — Playwright scoped browser
# Placeholder only. Replace command/url with an approved MCP server implementation.
# Secrets must come from local env, not Git.

mcp_servers:
  playwright_browser:
    command: "/opt/eksad-mcp/bin/playwright-browser"
    args: []
    env:
      PLAYWRIGHT_BROWSER_TOKEN: "${PLAYWRIGHT_BROWSER_TOKEN}"
    timeout: 120
    connect_timeout: 60
    sampling:
      enabled: false
