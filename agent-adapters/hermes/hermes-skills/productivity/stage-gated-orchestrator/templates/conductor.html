<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EKSAD Conductor</title>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--yellow:#d29922;--blue:#58a6ff;--red:#f85149;--purple:#a371f7}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -20%,#1d2940,var(--bg) 55%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui;padding:28px}.wrap{max-width:1000px;margin:auto}header{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:22px}h1{font-size:22px;margin:0 0 5px}.muted{color:var(--muted);font-size:13px}.live{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:var(--red)}.dot.ok{background:var(--green);box-shadow:0 0 9px var(--green)}.hero,.stage,.log{background:rgba(22,27,34,.94);border:1px solid var(--line);border-radius:13px}.hero{padding:18px;margin-bottom:18px;display:flex;gap:14px;align-items:center}.avatar{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#1f6feb;font-size:24px}.message{font:13px ui-monospace,monospace;color:#7ee787;margin-top:5px}.stage{display:grid;grid-template-columns:60px 1fr 150px;gap:14px;align-items:center;padding:17px;margin:12px 0;border-left:4px solid var(--line)}.stage.in_progress,.stage.validating{border-left-color:var(--yellow)}.stage.awaiting_review{border-left-color:var(--blue);box-shadow:0 0 0 1px rgba(88,166,255,.2)}.stage.approved{border-left-color:var(--green)}.stage.revision_required,.stage.blocked,.stage.aborted{border-left-color:var(--red)}.stage.skipped{border-left-color:var(--purple)}.badge{width:50px;height:50px;border-radius:11px;display:grid;place-items:center;background:#6e40c9;font-weight:800}.title{font-weight:700}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.chip{border:1px solid var(--line);border-radius:999px;padding:3px 8px;color:var(--muted);font:11px ui-monospace,monospace}.status{text-align:right;font:12px ui-monospace,monospace}.status b{display:block;font-size:13px;margin-bottom:4px}.log{margin-top:20px;padding:16px;max-height:360px;overflow:auto;font:12px ui-monospace,monospace}.entry{padding:4px 0;border-bottom:1px solid rgba(48,54,61,.35)}.time{color:var(--muted);margin-right:8px}.role{color:var(--blue);display:inline-block;min-width:85px}.empty{color:var(--muted)}@media(max-width:720px){body{padding:14px}.stage{grid-template-columns:50px 1fr}.status{grid-column:2;text-align:left}header{flex-direction:column}}
</style>
</head>
<body><div class="wrap">
<header><div><h1>🎼 EKSAD Stage-Gated Conductor</h1><div class="muted" id="project">Loading pipeline…</div></div><div class="live"><span class="dot" id="dot"></span><span id="connection">connecting</span></div></header>
<div class="hero"><div class="avatar">🎯</div><div><b>Orchestrator</b><div class="muted">delegate → verify → HITL gate → chain</div><div class="message" id="message">Initializing tracker…</div></div></div>
<div id="stages"></div>
<div class="log"><b>ACTIVITY LOG</b><div id="events" style="margin-top:10px"></div></div>
</div>
<script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=b=>!b?'—':b<1024?b+' B':(b/1024).toFixed(1)+' KB';
function render(d){document.getElementById('dot').className='dot ok';document.getElementById('connection').textContent='live · '+new Date().toLocaleTimeString();document.getElementById('project').textContent=d.project+' · '+(d.gates_enabled?'HITL gates enabled':'NO-GATES mode');let active=d.stages.find(s=>['in_progress','validating','awaiting_review','revision_required','blocked'].includes(s.status));document.getElementById('message').textContent=active?`${active.id}: ${active.status}${active.last_message?' — '+active.last_message:''}`:'Pipeline idle / complete';document.getElementById('stages').innerHTML=d.stages.map(s=>`<div class="stage ${esc(s.status)}"><div class="badge">${esc(s.id)}</div><div><div class="title">${esc(s.name)}</div><div class="muted">${esc(s.role)} · ${esc(s.skill)}</div><div class="meta"><span class="chip">${esc(s.artifact)}</span><span class="chip">${fmt(s.artifact_size)}</span><span class="chip">revisions: ${s.revisions||0}</span></div></div><div class="status"><b>${esc(s.status)}</b>${s.gate_decision?esc(s.gate_decision):''}</div></div>`).join('');document.getElementById('events').innerHTML=d.events.length?d.events.slice().reverse().map(e=>`<div class="entry"><span class="time">${esc((e.ts_iso||'').slice(11,19))}</span><span class="role">[${esc((e.role||'system').toUpperCase())}]</span>${esc(e.message)}</div>`).join(''):'<div class="empty">No events yet.</div>'}
async function poll(){try{let r=await fetch('/api/state',{cache:'no-store'});if(!r.ok)throw Error('HTTP '+r.status);render(await r.json())}catch(e){document.getElementById('dot').className='dot';document.getElementById('connection').textContent='disconnected: '+e.message}}
poll();setInterval(poll,1500);
</script></body></html>
